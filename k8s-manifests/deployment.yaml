apiVersion: apps/v1
kind: Deployment
metadata:
  name: actions-app-deployment
  labels:
    app: actions-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: actions-app
  template:
    metadata:
      labels:
        app: actions-app
    spec:
      containers:
      - name: actions-app
        image: 817833395978.dkr.ecr.ap-south-1.amazonaws.com/action-cicd:latest
        ports:
        - containerPort: 3000
